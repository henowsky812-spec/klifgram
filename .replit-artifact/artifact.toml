kind = "web"
previewPath = "/"
title = "KlifGram Messenger"
version = "1.0.0"
id = "artifacts/klifgram"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20219

[services.development]
run = "pnpm --filter @workspace/klifgram run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/klifgram", "run", "build" ]
publicDir = "artifacts/klifgram/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20219"
BASE_PATH = "/"
